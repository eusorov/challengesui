services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: challenges-ui
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=challenges.usomi.de,challenges.local
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=challenges.usomi.de
    restart: unless-stopped
    networks:
      - nginx_proxy_net

networks:
  nginx_proxy_net:
    external: true